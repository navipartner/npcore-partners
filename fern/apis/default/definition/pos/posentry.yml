# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json

imports:
  globalApiTypes: ./../global-api-types.yml
  externalSaleTypes: ./externalsale.yml

types:
  posEntryId:
    type: uuid
    docs: The unique identifier of a POS Entry

  posEntryType:
    enum:
      - name: COMMENT
        value: 'Comment'
      - name: DIRECT_SALE
        value: 'Direct Sale'
      - name: OTHER
        value: 'Other'
      - name: CREDIT_SALE
        value: 'Credit Sale'
      - name: BALANCING
        value: 'Balancing'
      - name: CANCELLED_SALE
        value: 'Cancelled Sale'

  salesLineType:
    enum:
      - name: COMMENT
        value: 'Comment'
      - name: GL_ACCOUNT
        value: 'G/L Account'
      - name: ITEM
        value: 'Item'
      - name: CUSTOMER
        value: 'Customer'
      - name: VOUCHER
        value: 'Voucher'
      - name: PAYOUT
        value: 'Payout'
      - name: ROUNDING
        value: 'Rounding'

  postStatus:
    enum:
      - name: UNPOSTED
        value: 'Unposted'
      - name: ERROR_WHILE_POSTING
        value: 'Error while Posting'
      - name: POSTED
        value: 'Posted'
      - name: NOT_TO_BE_POSTED
        value: 'Not To Be Posted'

  POSEntrySalesLine:
    docs: A sales line from a POS Entry
    properties:
      lineId: uuid
      sortKey: integer
      type: salesLineType
      code: string
      variantCode: optional<string>
      description: string
      description2: optional<string>
      quantity: double
      unitPrice: double
      vatPercent: double
      discountPct: double
      discountAmount: double
      amountInclVat: double
      taxAmount: double
      unitOfMeasure: optional<string>
      locationCode: optional<string>
    examples:
      - name: ExampleSalesLine
        value:
          lineId: 8c3f4dbe-d927-4e8a-89ab-12345678abcd
          sortKey: 10000
          type: "Item"
          code: "ITEM-001"
          variantCode: "RED"
          description: "Premium Widget"
          quantity: 2
          unitPrice: 100.00
          vatPercent: 25.00
          discountPct: 10.00
          discountAmount: 20.00
          amountInclVat: 180.00
          taxAmount: 36.00
          unitOfMeasure: "PCS"
          locationCode: "MAIN"

  POSEntryPaymentLine:
    docs: A payment line from a POS Entry
    properties:
      lineId: uuid
      sortKey: integer
      paymentMethodCode: string
      description: string
      amountInclVat: double
      isEFT: boolean
      externalDocumentNo: optional<string>
    examples:
      - name: ExamplePaymentLine
        value:
          lineId: 2b5a9c4e-f123-4d56-78ab-98765432fedc
          sortKey: 10000
          paymentMethodCode: "CASH"
          description: "Cash Payment"
          amountInclVat: 180.00
          isEFT: false

  POSEntryTaxLine:
    docs: A tax line from a POS Entry
    properties:
      taxJurisdictionCode: optional<string>
      taxIdentifier: optional<string>
      taxPercent: double
      taxBaseAmount: double
      taxAmount: double
    examples:
      - name: ExampleTaxLine
        value:
          taxIdentifier: "STANDARD"
          taxPercent: 25.00
          taxBaseAmount: 144.00
          taxAmount: 36.00

  POSEntry:
    docs: A completed POS Entry (transaction) with its sales, payment, and tax lines
    properties:
      entryId: posEntryId
      entryNo: integer
      documentNo: string
      fiscalNo: optional<string>
      entryDate: date
      startingTime:
        type: string
        docs: Time when the transaction started (format HH:MM:SS)
      endingTime:
        type: string
        docs: Time when the transaction ended (format HH:MM:SS)
      posStore: string
      posUnit: string
      entryType: posEntryType
      description: optional<string>
      customerNo: optional<string>
      customerId: optional<uuid>
      salespersonCode: optional<string>
      totalAmountInclVat: double
      taxAmount: double
      postEntryStatus: postStatus
      postItemEntryStatus: postStatus
      postingDate: date
      documentDate: date
      externalDocumentNo: optional<string>
      rowVersion:
        type: optional<string>
        docs: Row version for sync operations (only present when sync=true in request)
      salesLines: optional<list<POSEntrySalesLine>>
      paymentLines: optional<list<POSEntryPaymentLine>>
      taxLines: optional<list<POSEntryTaxLine>>
    examples:
      - name: ExamplePOSEntry
        value:
          entryId: 7f8e9d6c-5a4b-3c2d-1e0f-9a8b7c6d5e4f
          entryNo: 12345
          documentNo: "STORE01-001-00123"
          fiscalNo: "FIS-2024-00123"
          entryDate: "2024-01-15"
          startingTime: "14:30:00"
          endingTime: "14:32:00"
          posStore: "STORE01"
          posUnit: "POS001"
          entryType: "Direct Sale"
          description: "Regular Sale"
          customerNo: "C10001"
          customerId: "a1b2c3d4-e5f6-47a8-b9c0-d1e2f3a4b5c6"
          salespersonCode: "SP001"
          totalAmountInclVat: 180.00
          taxAmount: 36.00
          postEntryStatus: "Posted"
          postItemEntryStatus: "Posted"
          postingDate: "2024-01-15"
          documentDate: "2024-01-15"
          salesLines:
            - $POSEntrySalesLine.ExampleSalesLine
          paymentLines:
            - $POSEntryPaymentLine.ExamplePaymentLine
          taxLines:
            - $POSEntryTaxLine.ExampleTaxLine

  PaginatedPOSEntry:
    docs: A paginated response containing a list of POS Entries
    properties:
      morePages: boolean
      nextPageKey: string
      nextPageURL: string
      data: list<POSEntry>
    examples:
      - name: ExamplePaginatedPOSEntry
        value:
          morePages: true
          nextPageKey: "eyJ2aWV3IjoiVkVSU0lPTigxKSBTT1JUSU5HKEZpZWxkMSkgV0hFUkUoRmllbGQxMD0xKDAxKSkiLCJpbmRleEZpZWxkcyI6eyIxIjoiMiJ9fQ=="
          nextPageURL: "https://api.npretail.app/tenant/env/company/pos/entry?pageSize=50&pageKey=eyJ2aWV3IjoiVkVSU0lPTigxKSBTT1JUSU5HKEZpZWxkMSkgV0hFUkUoRmllbGQxMD0xKDAxKSkiLCJpbmRleEZpZWxkcyI6eyIxIjoiMiJ9fQ=="
          data:
            - $POSEntry.ExamplePOSEntry

  PrintJobType:
    enum:
      - name: WindowsSpooler
        value: windows_spooler
      - name: Http
        value: http

  PrintJob:
    docs: A single print job captured from the retail print pipeline
    properties:
      type:
        type: PrintJobType
        docs: The output type that determines how the client should deliver the print job
      printerName:
        type: optional<string>
        docs: Windows printer name (only present when type is windows_spooler)
      url:
        type: optional<string>
        docs: Full HTTP URL including endpoint path (only present when type is http)
      printJob:
        type: string
        docs: Base64-encoded print job data

  POSEntryPrintResponse:
    docs: Response containing an array of print jobs for a POS Entry receipt
    properties:
      entryId: posEntryId
      prints: list<PrintJob>
    examples:
      - name: ExamplePrintResponseLocal
        value:
          entryId: "7f8e9d6c-5a4b-3c2d-1e0f-9a8b7c6d5e4f"
          prints:
            - type: windows_spooler
              printerName: "RECEIPT-PRINTER"
              printJob: "MTsgMTsgMTsgMCwwLDAsMCwwLDAsMCwwOyAtMTsKMS4wMDAwMDA7IDEuMDAwMDAwOyAxOyBFcHNvbjs..."
      - name: ExamplePrintResponseHTTP
        value:
          entryId: "7f8e9d6c-5a4b-3c2d-1e0f-9a8b7c6d5e4f"
          prints:
            - type: http
              url: "https://print.example.com/api/print"
              printJob: "MTsgMTsgMTsgMCwwLDAsMCwwLDAsMCwwOyAtMTsKMS4wMDAwMDA7IDEuMDAwMDAwOyAxOyBFcHNvbjs..."
      - name: ExamplePrintResponseMultiple
        value:
          entryId: "7f8e9d6c-5a4b-3c2d-1e0f-9a8b7c6d5e4f"
          prints:
            - type: windows_spooler
              printerName: "RECEIPT-PRINTER"
              printJob: "MTsgMTsgMTsgMCwwLDAsMCwwLDAsMCwwOyAtMTsKMS4wMDAwMDA7IDEuMDAwMDAwOyAxOyBFcHNvbjs..."
            - type: windows_spooler
              printerName: "RECEIPT-PRINTER"
              printJob: "RUZUUmVjZWlwdERhdGEuLi4="

service:
  auth: true
  base-path: /pos
  endpoints:
    listPOSEntries:
      display-name: List POS Entries
      docs: Get a paginated list of POS Entries (completed transactions) with optional filters. Supports sync mode for efficient incremental synchronization.
      method: GET
      path: "/entry"
      request:
        name: listPOSEntries
        query-parameters:
          posStore:
            type: optional<string>
            docs: Filter by POS Store Code
          posUnit:
            type: optional<string>
            docs: Filter by POS Unit Number
          documentNo:
            type: optional<string>
            docs: Filter by Document Number
          pageSize:
            type: optional<integer>
            docs: Number of entries to return per page
          pageKey:
            type: optional<string>
            docs: Continuation token for pagination
          sync:
            type: optional<boolean>
            docs: Enable sync mode - returns entries ordered by rowVersion for efficient incremental synchronization
          lastRowVersion:
            type: optional<string>
            docs: When sync=true, only return entries with rowVersion greater than this value
      response: PaginatedPOSEntry
      examples:
        - name: ExampleListPOSEntries
          path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
          query-parameters:
            posStore: "STORE01"
            pageSize: 50
          response:
            body: $PaginatedPOSEntry.ExamplePaginatedPOSEntry

    getPOSEntry:
      display-name: Get POS Entry
      docs: Get a single POS Entry by its ID, including all sales lines, payment lines, and tax lines
      method: GET
      path: "/entry/{entryId}"
      path-parameters:
        entryId: posEntryId
      response: POSEntry
      examples:
        - name: ExampleGetPOSEntry
          path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            entryId: "7f8e9d6c-5a4b-3c2d-1e0f-9a8b7c6d5e4f"
          response:
            body: $POSEntry.ExamplePOSEntry

    getSalesReceiptPrint:
      display-name: Get Sales Receipt Print
      docs: Generate sales receipt print jobs for a POS Entry. Returns an array of print jobs (PDFs for reports, or raw printer commands for line printer codeunits) as base64-encoded strings. The output format depends on the Report Selection configuration.
      method: GET
      path: "/entry/{entryId}/print/salesreceipt"
      path-parameters:
        entryId: posEntryId
      response: POSEntryPrintResponse
      examples:
        - name: ExampleGetSalesReceiptReport
          path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            entryId: "7f8e9d6c-5a4b-3c2d-1e0f-9a8b7c6d5e4f"
          response:
            body: $POSEntryPrintResponse.ExamplePrintResponseLocal

    getTerminalReceiptPrint:
      display-name: Get Terminal Receipt Print
      docs: Generate terminal/EFT receipt print jobs for a POS Entry. Returns an array of print jobs as base64-encoded strings. Multiple print jobs may be returned if there are multiple EFT transactions for the entry.
      method: GET
      path: "/entry/{entryId}/print/terminalreceipt"
      path-parameters:
        entryId: posEntryId
      response: POSEntryPrintResponse
      examples:
        - name: ExampleGetTerminalReceiptRaw
          path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            entryId: "7f8e9d6c-5a4b-3c2d-1e0f-9a8b7c6d5e4f"
          response:
            body: $POSEntryPrintResponse.ExamplePrintResponseLocal
        - name: ExampleGetTerminalReceiptMultiple
          path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            entryId: "7f8e9d6c-5a4b-3c2d-1e0f-9a8b7c6d5e4f"
          response:
            body: $POSEntryPrintResponse.ExamplePrintResponseMultiple
