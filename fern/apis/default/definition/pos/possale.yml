              amountInclVat: 125.00

    createPOSPaymentLine:
      display-name: Create Payment Line
      docs: Creates a new payment line. The API consumer must provide a unique GUID for the paymentLineId. Supports Cash and EFT (with external payment data storage) payments. Returns the saleId and a refresh object with SystemIds of updated entities and totals.
      method: POST
      path: "/sale/{saleId}/paymentline/{paymentLineId}"
      path-parameters:
        saleId: saleId
        paymentLineId: paymentLineId
      request: CreatePOSPaymentLine
      response:
        type: POSRefreshResponse
        status-code: 201
      examples:
        - path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            saleId: 0d200aa6-aacd-4b78-b673-c4fb7461f5ea
            paymentLineId: 80c340c5-00ce-46c5-8a32-8736e59b7816
          request: $CreatePOSPaymentLine.ExampleCashPayment
          response:
            body: $POSRefreshResponse.ExampleRefreshWithPaymentLine

    deletePOSPaymentLine:
      display-name: Delete Payment Line
