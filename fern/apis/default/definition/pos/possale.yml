    # EFT (Adyen Cloud) endpoints
    prepareEFTPayment:
      display-name: Prepare EFT Payment
      docs: |
        Creates an EFT transaction request for the sale. Uses the POS unit's self-service profile to resolve the EFT payment method.
        Requires the POS unit to be of type UNATTENDED with a self-service profile configured.
        If amount is omitted, the remaining balance of the sale is used.
      method: POST
      path: "/sale/{saleId}/eft/prepare"
      path-parameters:
        saleId: saleId
      request: EFTPrepareRequest
      response: EFTPrepareResponse
      examples:
        - path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            saleId: 0d200aa6-aacd-4b78-b673-c4fb7461f5ea
          request: $EFTPrepareRequest.ExamplePrepare
          response:
            body: $EFTPrepareResponse.ExamplePrepared

    buildEFTRequest:
      display-name: Build EFT Request (Local)
      docs: Builds the integration-specific JSON request for a local EFT transaction (e.g., tap-to-pay). Not yet implemented.
      method: GET
      path: "/sale/{saleId}/eft/{transactionId}/local/buildRequest"
      path-parameters:
        saleId: saleId
        transactionId: transactionId

    parseEFTResponse:
      display-name: Parse EFT Response (Local)
      docs: Parses a JSON response from a local EFT integration (e.g., Adyen tap-to-pay SDK) and creates a payment line if successful. Not yet implemented.
      method: POST
      path: "/sale/{saleId}/eft/{transactionId}/local/parseResponse"
      path-parameters:
        saleId: saleId
        transactionId: transactionId

    startEFTPayment:
      display-name: Start EFT Payment (Cloud)
      docs: |
        Starts the EFT payment by sending the request to the Adyen cloud terminal API synchronously.
        This call blocks until the terminal responds (up to 5 minutes on BC SaaS).
        The response indicates whether the request was processed - poll the status endpoint to get the actual payment result.
      method: POST
      path: "/sale/{saleId}/eft/{transactionId}/cloud/start"
      path-parameters:
        saleId: saleId
        transactionId: transactionId
      response: EFTStartResponse
      examples:
        - path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            saleId: 0d200aa6-aacd-4b78-b673-c4fb7461f5ea
            transactionId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          response:
            body: $EFTStartResponse.ExampleStarted

    pollEFTStatus:
      display-name: Poll EFT Status
      docs: |
        Returns the current status of an EFT transaction.
        When the result is known, additional fields like resultCode, cardNumber, cardName, authorizationNumber, and resultMessage are included.
        When the transaction is successful, a paymentDelta is included containing the EFT payment line(s) in POS data source format with rows and totals.
      method: GET
      path: "/sale/{saleId}/eft/{transactionId}/cloud/status"
      path-parameters:
        saleId: saleId
        transactionId: transactionId
      response: EFTStatusResponse
      examples:
        - name: ExampleCompleted
          path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            saleId: 0d200aa6-aacd-4b78-b673-c4fb7461f5ea
            transactionId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          response:
            body: $EFTStatusResponse.ExampleCompleted
        - name: ExamplePending
          path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            saleId: 0d200aa6-aacd-4b78-b673-c4fb7461f5ea
            transactionId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          response:
            body: $EFTStatusResponse.ExamplePending

    cancelEFTTransaction:
      display-name: Cancel EFT Transaction
      docs: |
        Requests cancellation of an in-progress EFT transaction by sending an abort request to the Adyen cloud terminal.
        The cancellation is fire-and-forget - poll the status endpoint to confirm the final outcome.
      method: POST
      path: "/sale/{saleId}/eft/{transactionId}/cloud/cancel"
      path-parameters:
        saleId: saleId
        transactionId: transactionId
      response: EFTCancelResponse
      examples:
        - path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            saleId: 0d200aa6-aacd-4b78-b673-c4fb7461f5ea
            transactionId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          response:
            body: $EFTCancelResponse.ExampleCancelRequested
