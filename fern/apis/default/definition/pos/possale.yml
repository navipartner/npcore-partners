            saleId: 0d200aa6-aacd-4b78-b673-c4fb7461f5ea
          response:
            body:
              - id: 80c340c5-00ce-46c5-8a32-8736e59b7816
                sortKey: 20000
                paymentMethodCode: "CASH"
                description: "Cash Payment"
                amountInclVat: 125.00

    getPOSPaymentLine:
      display-name: Get Payment Line
      docs: Retrieves a specific payment line
      method: GET
