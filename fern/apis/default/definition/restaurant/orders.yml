# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json
imports:
  globalApiTypes: ./../global-api-types.yml
  types: ./types-restaurant.yml

service:
  display-name: Kitchen Orders
  auth: true
  base-path: /restaurant/{restaurantId}/orders
  path-parameters:
    restaurantId:
      docs: The restaurant system ID
      type: uuid

  endpoints:
    getKitchenOrders:
      display-name: List Kitchen Orders
      method: GET
      path: ""
      request:
        name: GetKitchenOrdersRequest
        query-parameters:
          status:
            docs: Filter by order status
            type: optional<types.KitchenOrderStatus>
          pageSize:
            docs: Number of orders per page (max 100, default 50)
            type: optional<integer>
          pageKey:
            docs: Page key for continuation (obtained from previous response nextPageKey)
            type: optional<string>
      response: types.KitchenOrdersResponse
      examples:
        - name: ExampleGetKitchenOrders
          path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            restaurantId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          query-parameters:
            pageSize: 10
          response:
            body:
              morePages: true
              nextPageKey: "eyJSZXN0YXVyYW50IENvZGUiOiJCSVNUUk8wMSJ9"
              nextPageURL: "/restaurant/a1b2c3d4-e5f6-7890-abcd-ef1234567890/orders?pageSize=10&pageKey=eyJSZXN0YXVyYW50IENvZGUiOiJCSVNUUk8wMSJ9"
              data:
                - orderId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                  orderNo: 1001
                  restaurantCode: "BISTRO01"
                  status: Planned
                  priority: 1
                  createdDateTime: "2024-01-15T14:30:00Z"
                  expectedDineDateTime: "2024-01-15T15:00:00Z"
                  finishedDateTime: ""
                  onHold: false

    getKitchenOrder:
      display-name: Get Kitchen Order
      docs: Get a specific kitchen order by its ID
      method: GET
      path: "/{orderId}"
      path-parameters:
        orderId:
          docs: The kitchen order system ID
          type: uuid
      response: types.KitchenOrder
      examples:
        - name: ExampleGetKitchenOrder
          path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            restaurantId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            orderId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
          response:
            body:
              orderId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
              orderNo: 1001
              restaurantCode: "BISTRO01"
              status: Planned
              priority: 1
              createdDateTime: "2024-01-15T14:30:00Z"
              expectedDineDateTime: "2024-01-15T15:00:00Z"
              onHold: false
