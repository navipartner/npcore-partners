# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json
imports:
  globalApiTypes: ./../global-api-types.yml
  types: ./types-restaurant.yml

service:
  display-name: Restaurant Menus
  auth: true
  base-path: /restaurant

  endpoints:
    listMenus:
      docs: List all menus for a restaurant without full content
      display-name: List Menus
      method: GET
      path: "/{restaurantId}/menu"
      path-parameters:
        restaurantId:
          type: uuid
          docs: The restaurant system ID
      response: list<types.MenuSummary>
      examples:
        - name: ExampleListMenus
          path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            restaurantId: "e7b7e6b6-e3b7-f011-a901-f68f27c8de7a"
          response:
            body:
              - id: "e7b7e6b6-e3b7-f011-a901-f68f27c8de7a"
                code: "QR_MENU"
                startTime: "09:00:00"
                endTime: "18:00:00"
                timezone: "(UTC+01:00) Brussels, Copenhagen, Madrid, Paris"
                active: true
                lastUpdated: "2026-01-15T14:30:00Z"

    getMenu:
      docs: Get a specific menu with full details including categories, items, addons, and translations
      display-name: Get Menu
      method: GET
      path: "/{restaurantId}/menu/{menuId}"
      path-parameters:
        restaurantId:
          type: uuid
          docs: The restaurant system ID
        menuId:
          type: uuid
          docs: The menu system ID
      response: types.Menu
      examples:
        - name: ExampleGetMenu
          path-parameters:
            tenant: $globalApiTypes.tenant.Exampletenant
            environment: $globalApiTypes.environment.ExampleenvironmentProduction
            company: $globalApiTypes.Company.ExampleCompanyCronus
            restaurantId: "e7b7e6b6-e3b7-f011-a901-f68f27c8de7a"
            menuId: "e7b7e6b6-e3b7-f011-a901-f68f27c8de7a"
          response:
            body:
              id: "e7b7e6b6-e3b7-f011-a901-f68f27c8de7a"
              code: "QR_MENU"
              startTime: "09:00:00"
              endTime: "18:00:00"
